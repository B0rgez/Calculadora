<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="assets/calculate.png" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    <title>Calculadora</title>
  </head>
  <body>
    <header>
      <h1>Calculadora</h1>
    </header>

    <main class="contentMain">
      <section class="section-calc">
        <input class="input-number" placeholder="123" type="number" readonly />
        <hr />
        <div class="btn-calc">
          <button onclick="" class="botoes">AC</button>
          <button class="botoes">( )</button>
          <button class="botoes">/</button>
        </div>
        <div class="btn-calc2">
          <button class="botoes" id="">7</button>
          <button class="botoes" id="">8</button>
          <button class="botoes" id="">9</button>
          <button class="botoes">*</button>
        </div>
        <div class="btn-calc3">
          <button class="botoes" id="">4</button>
          <button class="botoes" id="">5</button>
          <button class="botoes" id="">6</button>
          <button class="botoes">-</button>
        </div>
        <div class="btn-calc4">
          <button class="botoes" id="">1</button>
          <button class="botoes" id="">2</button>
          <button class="botoes" id="">3</button>
          <button class="botoes">+</button>
        </div>
        <div class="btn-calc5">
          <button class="botoes" id="">0</button>
          <button class="botoes">,</button>
          <button class="botoes">=</button>
        </div>
      </section>
    </main>

    <footer>
      <p>Enzo Borges © 2026 Site. All rights reserved.</p>
    </footer>
  </body>
</html>
