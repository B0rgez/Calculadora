<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="assets/calculate.png" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    <title>Calculadora</title>
  </head>
  <body>
    <header>
      <h1>Calculadora</h1>
    </header>

    <main class="contentMain">
      <section class="section-calc">
        <div class="containter-input">
          <p class="result-input"></p>
          <input readonly id="display" placeholder="0" />
        </div>
        <hr />
        <div onclick="" class="container-btn">
          <button value="AC" class="botoes-operator">AC</button>
          <button value="DEL" class="botoes-operator">DEL</button>
          <button value="/" class="botoes-operator">/</button>
          <button value="*" class="botoes-operator">*</button>

          <button value="7" class="botoes-numbers">7</button>
          <button value="8" class="botoes-numbers">8</button>
          <button value="9" class="botoes-numbers">9</button>
          <button value="-" class="botoes-operator">-</button>

          <button value="6" class="botoes-numbers">6</button>
          <button value="5" class="botoes-numbers">5</button>
          <button value="4" class="botoes-numbers">4</button>
          <button value="+" class="botoes-operator">+</button>

          <button value="1" class="botoes-numbers">1</button>
          <button value="2" class="botoes-numbers">2</button>
          <button value="3" class="botoes-numbers">3</button>
          <button value="=" class="botoes-operator" style="grid-area: 4/4/6">
            =
          </button>

          <button value="0" class="botoes-numbers" style="grid-column: 1/3">
            0
          </button>
          <button value="." class="botoes-numbers">.</button>
        </div>
      </section>
    </main>

    <footer>
      <p>Developer by Enzo Borges | 03/2026</p>
    </footer>
  </body>
</html>
